<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Evolução de Pacientes</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <h1>Evolução de Pacientes</h1>
</header>

<section class="form-container">
  <h2>Registrar Evolução</h2>

  <form id="formEvolucao">
    <input type="text" id="paciente" placeholder="Nome do paciente" required>

    <input type="date" id="data" required>

    <select id="status">
      <option value="melhora">Melhora</option>
      <option value="piora">Piora</option>
    </select>

    <input type="number" id="nota" placeholder="Nota (0 a 10)" min="0" max="10" required>

    <textarea id="obs" placeholder="Observações"></textarea>

    <button type="submit">Salvar</button>
  </form>
</section>

<section class="tabela-container">
  <h2>Histórico</h2>

  <table>
    <thead>
      <tr>
        <th>Paciente</th>
        <th>Data</th>
        <th>Status</th>
        <th>Nota</th>
        <th>Observação</th>
      </tr>
    </thead>
    <tbody id="tabelaDados"></tbody>
  </table>
</section>

<section class="grafico-container">
  <h2>Gráfico de Evolução</h2>
  <canvas id="grafico"></canvas>
</section>

<script type="module">
import { auth } from "./js/firebase.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

document.getElementById("logoutBtn").addEventListener("click", () => {
  signOut(auth);
  window.location.href = "login.html";
});
</script>

<script src="js/app.js"></script>
</body>
</html>
